spring:
  application:
    name: fraud-intelligence-service

  datasource:
    url: jdbc:postgresql://localhost:5433/fraud_ai
    username: postgres
    password: postgres

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

server:
  port: 8080